name: Playwright Tests

on:
  push:
    branches: 
      - '**'        # run on all branches
  pull_request:
    branches: 
      - '**'        # run on all branches

  #minute hour day-of-month month day-of-week
  schedule:
    - cron: '0 2 1,15 * *'   # run full suite nightly at 2 AM UTC, 

jobs:
  quick-tests:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    strategy:
      matrix:
        project: [stage, prod]  
    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-node@v4
      with:
        node-version: 24

    - uses: actions/cache@v4
      with:
        path: ~/.npm
        key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
        restore-keys: |
          ${{ runner.os }}-node-

    - name: Install dependencies
      run: npm ci

    - name: Install Playwright Browsers
      run: npx playwright install --with-deps

    - name: Detect changed files
      id: changes
      run: |
        CHANGED=$(git diff --name-status ${{ github.event.before }} ${{ github.sha }} || true)
        NEWFILES=$(echo "$CHANGED" | grep '^A' | grep 'tests/.*\.spec\.js$' | cut -f2 || true)
        MODIFIED=$(echo "$CHANGED" | grep '^M' | grep 'tests/.*\.spec\.js$' | cut -f2 || true)
        CONFIGFILES=$(echo "$CHANGED" | grep 'playwright.config' || true)

        echo "newfiles=$NEWFILES" >> $GITHUB_OUTPUT
        echo "modified=$MODIFIED" >> $GITHUB_OUTPUT
        echo "configfiles=$CONFIGFILES" >> $GITHUB_OUTPUT

    - name: Run Playwright tests
      run: |
        if [ -n "${{ steps.changes.outputs.configfiles }}" ]; then
          echo "Config file changed → run sanity + full suite"
          npm run sanity
          npx playwright test --project=${{ matrix.project }}
        elif [ -n "${{ steps.changes.outputs.newfiles }}" ]; then
          echo "New test file(s): ${{ steps.changes.outputs.newfiles }}"
          npm run sanity
          npx playwright test --project=${{ matrix.project }} ${{ steps.changes.outputs.newfiles }}
        elif [ -n "${{ steps.changes.outputs.modified }}" ]; then
          echo "Modified test file(s): ${{ steps.changes.outputs.modified }}"
          npm run sanity
          npx playwright test --project=${{ matrix.project }} ${{ steps.changes.outputs.modified }}
        else
          echo "No relevant changes, skipping Playwright tests."
        fi

    - name: Upload Playwright report
      if: ${{ !cancelled() }}
      uses: actions/upload-artifact@v4
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30

    - name: Upload Playwright artifacts (on failure)
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: playwright-artifacts
        path: |
          test-results/
          traces/

  full-suite:
    timeout-minutes: 300   # allow longer time for full run
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-node@v4
      with:
        node-version: 24

    - uses: actions/cache@v4
      with:
        path: ~/.npm
        key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
        restore-keys: |
          ${{ runner.os }}-node-

    - name: Install dependencies
      run: npm ci

    - name: Install Playwright Browsers
      run: npx playwright install --with-deps

    - name: Run full Playwright suite
      run: npx playwright test

    - name: Upload Playwright report
      if: ${{ !cancelled() }}
      uses: actions/upload-artifact@v4
      with:
        name: playwright-report-full
        path: playwright-report/
        retention-days: 30

    - name: Upload Playwright artifacts (on failure)
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: playwright-artifacts-full
        path: |
          test-results/
          traces/
