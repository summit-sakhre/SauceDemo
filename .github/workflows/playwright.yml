name: Playwright Tests

on:
  push:
    branches: 
      - '**'        # run on all branches
  pull_request:
    branches: 
      - '**'        # run on all branches

  #minute hour day-of-month month day-of-week
  schedule:
    - cron: '0 2 1,15 * *'   # run full suite nightly at 2 AM UTC, 

jobs:
  quick-tests:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-node@v4
      with:
        node-version: 24

    - uses: actions/cache@v4
      with:
        path: ~/.npm
        key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
        restore-keys: |
          ${{ runner.os }}-node-

    - name: Install dependencies
      run: npm ci

    - name: Install Playwright Browsers
      run: npx playwright install --with-deps

    - name: Run Playwright tests
      run: |
        CHANGED=$(git diff --name-status ${{ github.event.before }} ${{ github.sha }} || true)
        NEWFILES=$(echo "$CHANGED" | grep '^A' | grep 'tests/.*\.spec\.js$' | cut -f2 || true)
        MODIFIED=$(echo "$CHANGED" | grep '^M' | grep 'tests/.*\.spec\.js$' | cut -f2 || true)
        CONFIGFILES=$(echo "$CHANGED" | grep 'playwright.config' || true)

        if [ -n "$CONFIGFILES" ]; then
          echo "Config file changed, running sanity + full suite"
          npm run sanity
          npx playwright test
        elif [ -n "$NEWFILES" ]; then
          echo "New test file(s) added: $NEWFILES"
          echo "Running sanity + new test files"
          npm run sanity
          npx playwright test $NEWFILES
        elif [ -n "$MODIFIED" ]; then
          echo "Modified test files: $MODIFIED"
          echo "Running sanity + modified test files"
          npm run sanity
          npx playwright test $MODIFIED
        else
          echo "No relevant changes, skipping Playwright tests."
        fi

    - name: Upload Playwright report
      if: ${{ !cancelled() }}
      uses: actions/upload-artifact@v4
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30

    - name: Upload Playwright artifacts (on failure)
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: playwright-artifacts
        path: |
          test-results/
          traces/

  full-suite:
    timeout-minutes: 300   # allow longer time for full run
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-node@v4
      with:
        node-version: 24

    - uses: actions/cache@v4
      with:
        path: ~/.npm
        key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
        restore-keys: |
          ${{ runner.os }}-node-

    - name: Install dependencies
      run: npm ci

    - name: Install Playwright Browsers
      run: npx playwright install --with-deps

    - name: Run full Playwright suite
      run: npx playwright test

    - name: Upload Playwright report
      if: ${{ !cancelled() }}
      uses: actions/upload-artifact@v4
      with:
        name: playwright-report-full
        path: playwright-report/
        retention-days: 30

    - name: Upload Playwright artifacts (on failure)
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: playwright-artifacts-full
        path: |
          test-results/
          traces/
