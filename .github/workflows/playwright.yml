name: Playwright Tests

on:
  push:
    branches:
      - '**'

  pull_request:
    branches:
      - '**'

  schedule:
    # 2 AM UTC on 1st and 15th
    - cron: '0 2 1,15 * *'

jobs:
  quick-tests:
    if: github.event_name != 'schedule'

    timeout-minutes: 60

    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        project:
          - stage
          - prod

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Detect changed files
        id: changes
        shell: bash
        run: |

          echo "Event: ${{ github.event_name }}"

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
            HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          else
            BASE_SHA="${{ github.event.before }}"
            HEAD_SHA="${{ github.sha }}"
          fi

          echo "Base SHA: $BASE_SHA"
          echo "Head SHA: $HEAD_SHA"

          CHANGED=$(git diff --name-status "$BASE_SHA" "$HEAD_SHA" || true)

          echo "Changed files:"
          echo "$CHANGED"

          NEWFILES=$(
            echo "$CHANGED" \
            | grep '^A' \
            | grep 'tests/.*\.spec\.[jt]s$' \
            | cut -f2 \
            | tr '\n' ' ' || true
          )

          MODIFIED=$(
            echo "$CHANGED" \
            | grep '^M' \
            | grep 'tests/.*\.spec\.[jt]s$' \
            | cut -f2 \
            | tr '\n' ' ' || true
          )

          CONFIGFILES=$(
            echo "$CHANGED" \
            | grep -E 'README\.md$|package\.json$|package-lock\.json$|playwright\.config|\.github/workflows/.*\.ya?ml$' \
            || true
          )

          echo "newfiles=$NEWFILES" >> $GITHUB_OUTPUT
          echo "modified=$MODIFIED" >> $GITHUB_OUTPUT
          echo "configfiles<<EOF" >> $GITHUB_OUTPUT
          echo "$CONFIGFILES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Show detected changes
        run: |
          echo "New Files:"
          echo "${{ steps.changes.outputs.newfiles }}"

          echo "Modified Files:"
          echo "${{ steps.changes.outputs.modified }}"

          echo "Config Files:"
          echo "${{ steps.changes.outputs.configfiles }}"

      - name: Execute tests
        shell: bash
        run: |

          if [ -n "${{ steps.changes.outputs.configfiles }}" ]; then

            echo "================================================="
            echo "Configuration / README / package / workflow change"
            echo "Running sanity tests"
            echo "================================================="

            npx playwright test \
              --grep @sanity \
              --project=${{ matrix.project }} \
              --retries=0

            echo "Running unit tests"

            npm run test:unit

          elif [ -n "${{ steps.changes.outputs.newfiles }}" ]; then

            echo "================================================="
            echo "New test files detected"
            echo "Running sanity suite first"
            echo "================================================="

            npx playwright test \
              --grep @sanity \
              --project=${{ matrix.project }} \
              --retries=0

            echo "Running new files"

            npx playwright test \
              --project=${{ matrix.project }} \
              ${{ steps.changes.outputs.newfiles }}

          elif [ -n "${{ steps.changes.outputs.modified }}" ]; then

            echo "================================================="
            echo "Modified test files detected"
            echo "Running sanity suite first"
            echo "================================================="

            npx playwright test \
              --grep @sanity \
              --project=${{ matrix.project }} \
              --retries=0

            echo "Running modified files"

            npx playwright test \
              --project=${{ matrix.project }} \
              ${{ steps.changes.outputs.modified }}

          else

            echo "================================================="
            echo "No relevant changes detected"
            echo "Skipping Playwright execution"
            echo "================================================="

          fi

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.project }}
          path: playwright-report/
          retention-days: 30

      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts-${{ matrix.project }}
          path: |
            test-results/
            traces/
          retention-days: 30

  full-suite:
    if: github.event_name == 'schedule'

    timeout-minutes: 300

    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        project:
          - stage
          - prod

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run full suite
        run: |
          npx playwright test --project=${{ matrix.project }}

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-full-${{ matrix.project }}
          path: playwright-report/
          retention-days: 30

      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts-full-${{ matrix.project }}
          path: |
            test-results/
            traces/
          retention-days: 30